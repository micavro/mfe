start_ops:
  - op0
end_ops:
  - op2

ops:
  op0:
    model: ../models/Llama-3.1-8B-Instruct/
    prompt: "Please try to answer the question with Chain of Thought."
    max_tokens: 1024
    input_ops: []
    output_ops:
      - op1

  op1:
    model: ../models/Llama-3.1-8B-Instruct/ 
    prompt: "Please give your critique and judgement towards the answer provided previously."
    max_tokens: 1024
    input_ops:
      - op0
    output_ops:
      - op2

  op2:
    model: ../models/Llama-3.1-8B-Instruct/
    prompt: "Please rethink and give your final answer considering the critique before. You should and should only put the final answer in the output."
    max_tokens: 1024
    input_ops:
      - op1
    output_ops: []
